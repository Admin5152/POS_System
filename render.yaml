services:
  - type: web
    name: pos-system
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && python manage.py init_render_data && gunicorn pos_system.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pos-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: RENDER
        value: true
    # Add health check and restart policy
    healthCheck:
      path: /
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5

databases:
  - name: pos-db
    plan: free
