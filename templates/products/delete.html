{% extends 'base.html' %}

{% block title %}Delete Product{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="fas fa-exclamation-triangle"></i> Confirm Deletion</h5>
            </div>
            <div class="card-body text-center p-5">
                <h4>Are you sure you want to delete <strong>{{ product.product_name }}</strong>?</h4>
                <p class="text-muted">This action cannot be undone.</p>

                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <a href="{% url 'products:list' %}" class="btn btn-secondary px-4">Cancel</a>
                    <button type="submit" class="btn btn-danger px-4">Delete Product</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
